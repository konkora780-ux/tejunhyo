<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手順表</title>
<style>
  :root{
    --bg:#1c2430;
    --ink:#f3f6fa;
    --sub:#9fb0c3;
    --next:#3ea16f;   /* 次へ：緑 */
    --prev:#c9772e;   /* 戻る：橙 */
    --line:#3a4757;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg);color:var(--ink);
    font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;
    overflow:hidden;user-select:none;
  }
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}

  #cam,#overlay{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;transform:scaleX(-1);
  }
  #cam{opacity:0.16;filter:grayscale(1);}
  #overlay{z-index:1;pointer-events:none;}

  .stage{
    position:relative;z-index:2;flex:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px 96px;text-align:center;
  }
  .stepno{font-size:20px;color:var(--sub);letter-spacing:.1em;margin-bottom:12px;}
  .emoji{font-size:88px;line-height:1;margin-bottom:20px;}
  .steptext{font-size:40px;font-weight:700;line-height:1.4;white-space:pre-line;}

  .dots{
    position:relative;z-index:2;display:flex;gap:10px;justify-content:center;
    padding-bottom:18px;flex-wrap:wrap;
  }
  .dot{width:14px;height:14px;border-radius:50%;background:var(--line);}
  .dot.on{background:var(--ink);}

  .zone{
    position:absolute;top:0;bottom:0;width:92px;z-index:3;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;color:#fff;font-weight:700;
    background:rgba(255,255,255,.02);
  }
  .zone.left{left:0;border-right:1px solid var(--line);}
  .zone.right{right:0;border-left:1px solid var(--line);}
  .zone .ic{font-size:34px;}
  .zone .lbl{font-size:15px;}
  .fill{position:absolute;left:0;bottom:0;width:100%;height:0%;opacity:.55;transition:height .06s linear;}
  .zone.left  .fill{background:var(--prev);}
  .zone.right .fill{background:var(--next);}
  .zone.hot{background:rgba(255,255,255,.10);}

  #bar{
    position:relative;z-index:4;display:flex;gap:10px;align-items:center;
    padding:12px 96px;font-size:14px;color:var(--sub);min-height:56px;
  }
  #bar .status{flex:1;}
  #startBtn{
    background:var(--next);color:#fff;border:none;border-radius:12px;
    padding:12px 20px;font-size:17px;font-weight:700;
  }
  #startBtn:disabled{opacity:.5;}
</style>
</head>
<body>
<div id="app">
  <video id="cam" playsinline muted autoplay></video>
  <canvas id="overlay"></canvas>

  <div id="bar">
    <span class="status" id="status">「はじめる」を押してください（初回は数秒かかります）</span>
    <button id="startBtn" disabled>読み込み中…</button>
  </div>

  <div class="stage">
    <div class="stepno" id="stepno"></div>
    <div class="emoji" id="emoji"></div>
    <div class="steptext" id="steptext"></div>
  </div>

  <div class="dots" id="dots"></div>

  <div class="zone left" id="zoneL">
    <div class="fill" id="fillL"></div>
    <div class="ic">◀</div><div class="lbl">もどる</div>
  </div>
  <div class="zone right" id="zoneR">
    <div class="fill" id="fillR"></div>
    <div class="ic">▶</div><div class="lbl">つぎへ</div>
  </div>
</div>

<script type="module">
import { HandLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

/* ▼ 手順の中身：ここを書き換えれば内容を差し替えられます ▼ */
const STEPS = [
  {emoji:"🚰", text:"じゃぐちを ひねって\n水を だす"},
  {emoji:"🧼", text:"せっけんを つける"},
  {emoji:"👐", text:"てのひらを\nこすり合わせる"},
  {emoji:"🖐️", text:"ゆびの あいだも\nあらう"},
  {emoji:"💧", text:"水で よく ながす"},
  {emoji:"🧻", text:"タオルで ふく"},
];
/* ▲ ここまで ▲ */

/* 調整パラメータ（現場に合わせて変える） */
const LEFT_TH=0.40;   // 手が画面のどこまで左に来たら「もどる」判定か（0=左端,1=右端）
const RIGHT_TH=0.60;  // 手がどこまで右に来たら「つぎへ」判定か
const HOLD_NEED=16;   // 確定に必要なフレーム数（大きいほど長くかざす必要）
const COOLDOWN=40;    // 切替後の無反応フレーム数（連続誤反応ふせぎ）

const cam=document.getElementById('cam');
const overlay=document.getElementById('overlay');
const octx=overlay.getContext('2d');
const emojiEl=document.getElementById('emoji');
const textEl=document.getElementById('steptext');
const stepnoEl=document.getElementById('stepno');
const dotsEl=document.getElementById('dots');
const statusEl=document.getElementById('status');
const startBtn=document.getElementById('startBtn');
const zoneL=document.getElementById('zoneL'), zoneR=document.getElementById('zoneR');
const fillL=document.getElementById('fillL'), fillR=document.getElementById('fillR');

let idx=0, running=false, landmarker=null;
let holdL=0, holdR=0, cooldown=0, lastTime=-1;

function render(){
  const s=STEPS[idx];
  emojiEl.textContent=s.emoji;
  textEl.textContent=s.text;
  stepnoEl.textContent=(idx+1)+" / "+STEPS.length;
  dotsEl.innerHTML=STEPS.map((_,i)=>'<span class="dot '+(i===idx?'on':'')+'"></span>').join('');
}
function go(dir){
  const n=idx+dir;
  if(n<0||n>=STEPS.length) return;
  idx=n; render(); cooldown=COOLDOWN;
  holdL=holdR=0; fillL.style.height='0%'; fillR.style.height='0%';
}

/* 起動時にモデルを読み込む（初回はネット接続が必要） */
async function initModel(){
  try{
    const vision=await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    landmarker=await HandLandmarker.createFromOptions(vision,{
      baseOptions:{
        modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate:"GPU"
      },
      runningMode:"VIDEO",
      numHands:1
    });
    startBtn.disabled=false;
    startBtn.textContent="はじめる";
    statusEl.textContent="「はじめる」を押してカメラを許可してください";
  }catch(e){
    statusEl.textContent="読み込み失敗："+e.message+"（ネット接続を確認してください）";
  }
}

async function start(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user'}, audio:false
    });
    cam.srcObject=stream;
    await cam.play();
    overlay.width=cam.videoWidth; overlay.height=cam.videoHeight;
    running=true; startBtn.style.display='none';
    statusEl.textContent='手を 左右に かざして ページを めくれます';
    loop();
  }catch(e){
    statusEl.textContent='カメラを 使えません：'+e.name+'（設定でカメラを許可してください）';
  }
}

function loop(){
  if(!running) return;
  const now=performance.now();
  let handX=null;
  if(landmarker && cam.readyState>=2 && now!==lastTime){
    lastTime=now;
    const res=landmarker.detectForVideo(cam,now);
    octx.clearRect(0,0,overlay.width,overlay.height);
    if(res.landmarks && res.landmarks.length>0){
      const lm=res.landmarks[0];
      const palm=lm[9];           // 中指付け根＝手のひら中心付近
      handX=palm.x;               // 0=映像の左, 1=映像の右
      octx.fillStyle="rgba(62,161,111,.9)";
      octx.beginPath();
      octx.arc(palm.x*overlay.width, palm.y*overlay.height, 26, 0, Math.PI*2);
      octx.fill();
    }
  }

  const screenX = (handX===null) ? null : (1-handX);

  if(cooldown>0){ cooldown--; }
  else{
    const inLeft  = screenX!==null && screenX < LEFT_TH;
    const inRight = screenX!==null && screenX > RIGHT_TH;
    if(inLeft){ holdL++; zoneL.classList.add('hot'); } else { holdL=0; zoneL.classList.remove('hot'); }
    if(inRight){ holdR++; zoneR.classList.add('hot'); } else { holdR=0; zoneR.classList.remove('hot'); }
    fillL.style.height=Math.min(100,holdL/HOLD_NEED*100)+'%';
    fillR.style.height=Math.min(100,holdR/HOLD_NEED*100)+'%';
    if(holdL>=HOLD_NEED) go(-1);
    if(holdR>=HOLD_NEED) go(1);
  }
  requestAnimationFrame(loop);
}

startBtn.addEventListener('click',start);
render();
initModel();
</script>
</body>
</html>
